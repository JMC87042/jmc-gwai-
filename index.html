<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>

<body>
  <h1>Dashboard</h1>

  <div>
    Views: <span id="views">-</span><br>
    Likes: <span id="likes">-</span><br>
    Comments: <span id="comments">-</span>
  </div>

  <h2>Ranking</h2>
  <ul id="ranking"></ul>

<script>
const API = "https://mixbyjmc.pythonanywhere.com";

async function load() {
  try {
    const stats = await fetch(`${API}/api/stats/summary`).then(r => r.json());
    const ranking = await fetch(`${API}/api/whales/ranking?limit=5`).then(r => r.json());

    document.getElementById("views").textContent = stats.views;
    document.getElementById("likes").textContent = stats.likes;
    document.getElementById("comments").textContent = stats.comments;

    const ul = document.getElementById("ranking");
    ul.innerHTML = "";

    ranking.forEach(r => {
      const li = document.createElement("li");
      li.textContent = `${r.name} - ${r.value}`;
      ul.appendChild(li);
    });

  } catch (e) {
    console.error(e);
  }
}

load();
</script>

</body>
</html>
