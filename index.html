```html
<script>
    const API_URL = 'https://mixbyjmc.pythonanywhere.com/api';

    async function loadAllData() {
        try {
            document.getElementById('status').textContent = '🔄 데이터 로딩 중...';

            // 통계
            const statsRes = await fetch(`${API_URL}/stats/summary`);
            const stats = await statsRes.json();
            updateStats(stats);

            // 고래
            const whalesRes = await fetch(`${API_URL}/whales/ranking?limit=10`);
            const whalesData = await whalesRes.json();
            displayWhales(whalesData);

            // 호스트
            const hostsRes = await fetch(`${API_URL}/hosts/ranking`);
            const hostsData = await hostsRes.json();
            displayHosts(hostsData);

            // 타임라인
            const timelineRes = await fetch(`${API_URL}/analysis/timeline?limit=10`);
            const timelineData = await timelineRes.json();
            displayTimeline(timelineData);

            // 국가별 분석
            const countryRes = await fetch(`${API_URL}/stats/by-country`);
            const countryData = await countryRes.json();
            displayCountryStats(countryData);

            document.getElementById('status').textContent =
                '✅ 데이터 로드 완료!';

            document.getElementById('status').style.background =
                'var(--success)';

        } catch (error) {

            console.error('오류:', error);

            document.getElementById('status').textContent =
                '❌ 데이터 로드 실패: ' + error.message;

            document.getElementById('status').style.background =
                'var(--warning)';
        }
    }

    function updateStats(data = {}) {
        document.getElementById('stat-whales').textContent =
            data.active_whales ?? 0;

        document.getElementById('stat-gifts').textContent =
            `$${((data.total_gifts ?? 0) / 1000).toFixed(1)}K`;

        document.getElementById('stat-tx').textContent =
            data.transaction_count ?? 0;

        document.getElementById('stat-avg').textContent =
            `$${(data.average_gift ?? 0).toFixed(0)}`;
    }

    function displayWhales(whales = []) {
        const tbody = document.getElementById('whales-body');

        tbody.innerHTML = whales.map((w, idx) => `
            <tr>
                <td>${idx === 0 ? '👑' : idx + 1}</td>
                <td><strong>${w.nickname || w.name || '-'}</strong></td>
                <td>${w.country || '-'}</td>
                <td>$${(w.total_gifts_30d || w.total_amount || 0).toLocaleString()}</td>
                <td>${w.host_count || 0}</td>
                <td>$${(w.average_gift || 0).toFixed(0)}</td>
            </tr>
        `).join('');

        document.getElementById('whales-loading').style.display = 'none';
        document.getElementById('whales-table').style.display = 'table';
    }

    function displayHosts(hosts = []) {
        const tbody = document.getElementById('hosts-body');

        tbody.innerHTML = hosts.map((h, idx) => `
            <tr>
                <td>${idx + 1}</td>
                <td><strong>${h.nickname || h.name || '-'}</strong></td>
                <td>${h.country || '-'}</td>
                <td>${h.league || '-'}</td>
                <td>$${(h.total_received || h.total_amount || 0).toLocaleString()}</td>
                <td>${h.whale_count || 0}</td>
            </tr>
        `).join('');

        document.getElementById('hosts-loading').style.display = 'none';
        document.getElementById('hosts-table').style.display = 'table';
    }

    function displayTimeline(data = []) {
        const timeline = document.getElementById('timeline');

        timeline.innerHTML = data.map(tx => `
            <div class="timeline-item">
                <div class="time">
                    ⏰ ${tx.timestamp ? new Date(tx.timestamp).toLocaleTimeString() : '-'}
                </div>

                <div class="content">
                    <span class="whale-name">
                        ${tx.whale_nickname || '-'}
                    </span>

                    <span>→</span>

                    <span class="host-name">
                        ${tx.host_nickname || '-'}
                    </span>

                    <span class="amount">
                        $${(tx.amount || 0).toLocaleString()}
                    </span>
                </div>
            </div>
        `).join('');

        document.getElementById('timeline-loading').style.display = 'none';
        timeline.style.display = 'flex';
    }

    function displayCountryStats(data = []) {
        const tbody = document.getElementById('stats-body');

        tbody.innerHTML = data.map(s => `
            <tr>
                <td><strong>${s.country || '-'}</strong></td>
                <td>${s.whale_count || 0}</td>
                <td>$${(s.total_gifts || 0).toLocaleString()}</td>
                <td>${s.tx_count || 0}</td>
            </tr>
        `).join('');

        document.getElementById('stats-loading').style.display = 'none';
        document.getElementById('stats-table').style.display = 'table';
    }

    // 페이지 로드 시 데이터 조회
    window.addEventListener('load', loadAllData);

    // 30초마다 자동 새로고침
    setInterval(loadAllData, 30000);
</script>
```
